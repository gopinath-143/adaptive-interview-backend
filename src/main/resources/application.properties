spring.application.name=adaptive-interview-platform

# MYSQL CONFIGURATION

spring.datasource.url=jdbc:mysql://localhost:3306/adaptive_interview_db
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# QUESTION FILE LOCATION

question.bank.path=C:/Users/ADMIN/Desktop/questions.json

# INTERVIEW CONFIG

interview.questions.per.skill=3

# AI CONFIG

openrouter.api.key=${OPENROUTER_API_KEY}

openrouter.url=https://openrouter.ai/api/v1/chat/completions

openrouter.model=openai/gpt-4o-mini